name: 自动编译 APK

on:
  push:
    branches: [ "main" ]

# 这个变量能消除强制运行 Node 24 的大部分兼容性警告
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 获取最新代码
      uses: actions/checkout@v4

    - name: 配置 Java 环境
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        # 开启缓存，让下次编译快得飞起
        cache: 'gradle'

    - name: 安装/检查 Gradle 环境
      # 因为你没有在仓库里放 gradlew，我们让 GitHub 现场装一个最稳的 gradle
      run: |
        sudo apt-get update
        sudo apt-get install -y gradle

    - name: 执行 Gradle 编译
      # 使用 --no-daemon 避免在云端挂起，并忽略不必要的警告
      run: gradle assembleDebug --no-daemon -Dorg.gradle.project.android.aapt2.nowarn=true

    - name: 提取并上传 APK
      uses: actions/upload-artifact@v4
      with:
        name: KwaiHelper-Final-APK
        path: app/build/outputs/apk/debug/*.apk
        if-no-files-found: error
