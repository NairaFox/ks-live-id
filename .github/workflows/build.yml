name: 自动编译 APK

on:
  push:
    branches: [ "main" ] # 当有代码提交时自动触发

jobs:
  build:
    runs-on: ubuntu-latest # 使用 GitHub 免费提供的云端 Ubuntu 服务器

    steps:
    - name: 获取最新代码
      uses: actions/checkout@v3

    - name: 配置 Java 环境
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 执行 Gradle 编译
      run: gradle assembleDebug

    - name: 提取并上传 APK
      uses: actions/upload-artifact@v3
      with:
        name: KwaiHelper-APK # 最终下载的压缩包名称
        path: app/build/outputs/apk/debug/*.apk
